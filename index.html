<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virality Checker | v1.0.0</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00F5FF;
    --primary-dim: rgba(0,245,255,0.15);
    --primary-glow: 0 0 20px rgba(0,245,255,0.4);
    --secondary: #00FF88;
    --secondary-dim: rgba(0,255,136,0.12);
    --accent: #BF5FFF;
    --accent-dim: rgba(191,95,255,0.15);
    --warning: #FFB800;
    --warning-dim: rgba(255,184,0,0.15);
    --danger: #FF3366;
    --danger-dim: rgba(255,51,102,0.15);
    --tiktok: #25F4EE;
    --ig: #E1306C;
    --bg: #030812;
    --bg2: #060E1E;
    --card: #0A1628;
    --card2: #0D1C35;
    --border: rgba(0,245,255,0.12);
    --border-bright: rgba(0,245,255,0.35);
    --text: #C8E0FF;
    --text-dim: #5A7A9A;
    --text-bright: #FFFFFF;
    --shadow-neon: 0 0 30px rgba(0,245,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @keyframes border-flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes spinner {
    to { transform: rotate(360deg); }
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    left: 0; top: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(transparent, rgba(0,245,255,0.08), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
    padding: 20px 16px;
  }

  /* AUTH */
  .auth-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(3,8,18,0.96);
    backdrop-filter: blur(20px);
    display: flex; justify-content: center; align-items: center;
    z-index: 2000;
  }
  .auth-modal {
    background: var(--card);
    border: 1px solid var(--border-bright);
    border-radius: 16px;
    padding: 48px 40px;
    width: 90%; max-width: 440px;
    box-shadow: 0 0 60px rgba(0,245,255,0.15), 0 0 120px rgba(0,245,255,0.05);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .auth-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .auth-modal .icon-wrap {
    width: 72px; height: 72px;
    background: var(--primary-dim);
    border: 1px solid var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    box-shadow: var(--primary-glow);
  }
  .auth-modal h2 {
    font-family: 'Orbitron', monospace;
    color: var(--primary);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: var(--primary-glow);
  }
  .auth-modal p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .auth-input {
    width: 100%; padding: 14px 16px; margin: 8px 0;
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    font-size: 15px; font-family: 'Rajdhani', sans-serif;
    color: var(--text-bright);
    transition: 0.3s;
  }
  .auth-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 12px rgba(0,245,255,0.2); }

  /* HEADER */
  .header-area {
    background: linear-gradient(135deg, #060E1E 0%, #0A1628 60%, #070D1C 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 0;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    z-index: 50; /* ensures header stays above tabs */
  }
  .header-area::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--secondary), transparent);
    background-size: 200% 100%;
    animation: border-flow 4s linear infinite;
  }
  .header-glow-orb {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,245,255,0.04) 0%, transparent 70%);
    top: -150px; right: -50px;
    pointer-events: none;
  }

  .user-bar {
    display: flex; gap: 16px; align-items: center;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 20px;
    font-family: 'Share Tech Mono', monospace;
    flex-wrap: wrap;
  }
  .user-bar span { color: var(--primary); }

  .header-area h1 {
    font-family: 'Orbitron', monospace;
    color: var(--text-bright);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 24px;
    text-shadow: 0 0 30px rgba(0,245,255,0.3);
    position: relative;
  }
  .header-area h1 span { color: var(--primary); }

  /* NAV - DROPDOWN FIXED */
  .tab-container {
    display: flex; justify-content: center;
    flex-wrap: wrap; gap: 8px;
    padding-bottom: 24px;
    position: relative;
  }

  .tab-btn {
    background: rgba(0,245,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .tab-btn:hover {
    background: rgba(0,245,255,0.1);
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 0 12px rgba(0,245,255,0.15);
    transform: translateY(-2px);
  }
  .tab-btn.active {
    background: var(--primary-dim);
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }

  .dropdown { 
    position: relative; 
    display: inline-block; 
    z-index: 1000; /* ← FIXED: higher than tab content */
  }
  .dropdown-content {
    display: none;
    position: absolute;
    background: var(--card);
    border: 1px solid var(--border-bright);
    min-width: 220px;
    z-index: 10000; /* ← FIXED: guaranteed on top of everything */
    border-radius: 10px;
    overflow: hidden;
    top: calc(100% + 6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0,245,255,0.1);
  }
  .dropdown-content a {
    color: var(--text); padding: 13px 20px;
    text-decoration: none; display: block;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    transition: 0.2s; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    text-transform: uppercase;
  }
  .dropdown-content a:last-child { border-bottom: none; }
  .dropdown-content a:hover { background: var(--primary-dim); color: var(--primary); padding-left: 26px; }
  .dropdown:hover .dropdown-content { display: block; }

  /* TAB CONTENT */
  .tabcontent {
    display: none;
    padding: 36px;
    animation: fadeInUp 0.35s ease-out;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
  }

  /* All other styles below are 100% unchanged from your original file */
  h2 {
    font-family: 'Orbitron', monospace;
    color: var(--primary);
    font-size: 22px; font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(0,245,255,0.3);
  }
  .tab-subtitle {
    color: var(--text-dim); font-size: 14px;
    margin-bottom: 32px; line-height: 1.7;
    max-width: 860px;
    border-left: 2px solid var(--border-bright);
    padding-left: 14px;
  }
  h3 {
    color: var(--text-bright);
    font-size: 15px; font-weight: 700;
    margin: 36px 0 16px;
    text-transform: uppercase; letter-spacing: 1.5px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .control-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: 0.25s;
  }
  .control-card:hover { border-color: rgba(0,245,255,0.25); box-shadow: var(--shadow-neon); }
  .control-card.highlight { border-color: rgba(255,51,102,0.3); background: linear-gradient(135deg, var(--card) 0%, rgba(255,51,102,0.04) 100%); }
  .control-card.highlight::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--danger),transparent); }
  .control-card.success { border-color: rgba(0,255,136,0.3); background: linear-gradient(135deg, var(--card) 0%, rgba(0,255,136,0.04) 100%); }
  .control-card.success::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--secondary),transparent); }
  .control-card.accent { border-color: rgba(191,95,255,0.3); background: linear-gradient(135deg, var(--card) 0%, rgba(191,95,255,0.04) 100%); }
  .control-card.accent::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  .control-card.purple { border-color: rgba(191,95,255,0.25); }
  .control-card.tt-card { border-color: rgba(37,244,238,0.3); border-top: 3px solid var(--tiktok); }
  .control-card.ig-card { border-color: rgba(225,48,108,0.3); border-top: 3px solid var(--ig); }

  .info-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 18px;
    margin-bottom: 12px;
  }
  .info-card h4 { margin-bottom: 8px; font-size: 14px; color: var(--primary); font-weight: 700; }

  .label-flex {
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 700; margin-bottom: 14px;
    color: var(--text-bright); font-size: 14px;
    letter-spacing: 0.5px;
  }
  .val-badge {
    background: var(--primary-dim);
    color: var(--primary);
    border: 1px solid var(--primary);
    padding: 4px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
    box-shadow: 0 0 10px rgba(0,245,255,0.2);
  }

  input[type=range] {
    width: 100%; cursor: pointer;
    height: 4px; border-radius: 4px;
    -webkit-appearance: none;
    background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 12px rgba(0,245,255,0.5);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 16px; margin-top: 12px;
  }
  .input-box { display: flex; flex-direction: column; }
  .input-box label {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 7px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
    font-family: 'Share Tech Mono', monospace;
  }
  .input-box input, .input-box select {
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 8px; font-size: 14px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    color: var(--text-bright);
    transition: 0.25s;
  }
  .input-box input:focus, .input-box select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(0,245,255,0.15);
  }
  .input-box select option { background: var(--card); color: var(--text); }

  .insight-box {
    display: flex; gap: 12px;
    background: rgba(0,245,255,0.04);
    border: 1px solid var(--border);
    padding: 16px; border-radius: 10px;
    margin-top: 16px;
    font-size: 13px; color: var(--text); line-height: 1.6;
  }
  .insight-box .icon { font-size: 18px; flex-shrink: 0; }

  .score-display {
    text-align: center;
    background: var(--card);
    border: 1px solid var(--border-bright);
    border-radius: 16px; padding: 40px 32px;
    margin: 32px 0;
    position: relative; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,245,255,0.06);
  }
  .score-display::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    animation: pulse-glow 2.5s ease-in-out infinite;
  }
  .score-val {
    font-family: 'Orbitron', monospace;
    font-size: 90px; font-weight: 900;
    line-height: 1; margin: 12px 0;
    color: var(--primary);
    text-shadow: 0 0 40px rgba(0,245,255,0.5);
    letter-spacing: -2px;
  }
  .rating-badge {
    display: inline-block; padding: 8px 22px;
    border-radius: 30px; font-size: 16px; font-weight: 700;
    margin-bottom: 14px; letter-spacing: 1px;
    font-family: 'Orbitron', monospace;
  }
  .rating-desc { color: var(--text-dim); font-size: 14px; }

  .target-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .target-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 22px;
    transition: 0.3s; position: relative; overflow: hidden;
  }
  .target-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0,245,255,0.1); }
  .target-card::before { content:''; position:absolute; top:0;left:0;bottom:0;width:3px; background: linear-gradient(180deg, var(--primary), var(--accent)); }
  .target-card .tier-name { font-size: 12px; text-transform: uppercase; font-weight: 700; color: var(--primary); margin-bottom: 8px; letter-spacing: 1px; font-family: 'Share Tech Mono', monospace; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-val { font-weight: 700; color: var(--secondary); font-family: 'Share Tech Mono', monospace; }
  .tier-goal { font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 10px; padding: 6px 10px; background: var(--accent-dim); border-radius: 6px; letter-spacing: 0.5px; }

  .btn-primary {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
    padding: 12px 26px; border-radius: 8px; font-weight: 700;
    cursor: pointer; transition: 0.25s;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    box-shadow: 0 0 12px rgba(0,245,255,0.1);
  }
  .btn-primary:hover {
    background: var(--primary-dim);
    box-shadow: 0 0 24px rgba(0,245,255,0.25);
    transform: translateY(-2px);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-bright);
    padding: 12px 20px; border-radius: 8px; font-weight: 700;
    cursor: pointer; transition: 0.25s;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    letter-spacing: 0.5px;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text-bright); }
  .btn-accent {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 12px 26px; border-radius: 8px; font-weight: 700;
    cursor: pointer; transition: 0.25s;
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .btn-accent:hover { background: var(--accent-dim); box-shadow: 0 0 20px rgba(191,95,255,0.2); transform: translateY(-1px); }

  .tracker-table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 13px; }
  .tracker-table th, .tracker-table td { padding: 13px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  .tracker-table th { background: var(--card); color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; font-family: 'Share Tech Mono', monospace; }
  .tracker-table tr:hover td { background: rgba(0,245,255,0.02); }
  .tracker-table tr:last-child td { border-bottom: none; }
  .rpm-table { width: 100%; border-collapse: collapse; margin-top: 18px; font-size: 13px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .rpm-table th, .rpm-table td { padding: 12px 16px; border: 1px solid var(--border); text-align: left; }
  .rpm-table th { background: var(--card); font-weight: 700; text-transform: uppercase; color: var(--primary); font-size: 11px; font-family: 'Share Tech Mono', monospace; }

  .report-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 32px;
    margin-top: 24px; display: none;
    border-top: 3px solid var(--primary);
  }
  .range-card { padding: 22px; border-radius: 10px; background: var(--card2); border: 1px solid var(--border); text-align: center; }

  .breakdown {
    margin-top: 28px; font-size: 14px; color: var(--text);
    background: var(--card); padding: 22px;
    border-radius: 12px; border: 1px solid var(--border);
  }
  .breakdown h4 { margin-bottom: 16px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .breakdown div { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .breakdown div:last-child { border-bottom: none; }
  .breakdown div span:last-child { font-weight: 700; color: var(--primary); font-family: 'Share Tech Mono', monospace; }

  .stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; transition: 0.2s; }
  .stat-mini:hover { border-color: rgba(0,245,255,0.25); }
  .stat-mini .label { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.8px; font-family: 'Share Tech Mono', monospace; }
  .stat-mini .value { font-size: 28px; font-weight: 800; line-height: 1.1; font-family: 'Orbitron', monospace; }
  .stat-mini .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .progress-track { background: var(--card2); border-radius: 20px; height: 14px; overflow: hidden; position: relative; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 20px; transition: width 0.4s ease; }

  .api-section {
    background: linear-gradient(135deg, #050D1A, #060E1E);
    border: 1px solid var(--border-bright);
    border-radius: 12px; padding: 24px; margin-bottom: 22px;
    position: relative; overflow: hidden;
  }
  .api-section::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .api-section label { color: var(--text-dim); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 7px; font-family: 'Share Tech Mono', monospace; }
  .api-section input { background: var(--bg); border: 1px solid var(--border-bright); color: var(--text-bright); padding: 12px 14px; border-radius: 8px; font-size: 14px; font-family: 'Share Tech Mono', monospace; width: 100%; }
  .api-section input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px rgba(191,95,255,0.2); }
  .api-section .api-note { color: var(--text-dim); font-size: 11px; margin-top: 6px; line-height: 1.5; }

  hr { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }

  .version-footer {
    text-align: center; padding: 28px;
    color: var(--text-dim); font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
  }
  .version-footer span { color: var(--primary); }

  .section-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-bright), transparent); margin: 36px 0; }

  .sub-proj-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-top: 20px; }

  input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
  }
